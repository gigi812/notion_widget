<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Carousel</title>
<style>
  :root {
    --bg: #ffffff;
    --dot: #d9d9d9;
    --dot-active: #222222;
    --arrow-bg: rgba(255, 255, 255, 0.9);
    --arrow-fg: #222222;
    --frame-radius: 12px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 16px;
  }

  /* ===== Carousel ===== */
  .carousel {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    position: relative;
  }

  .carousel-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 2 / 3; /* 세로 3:2 (height:width = 3:2) */
    overflow: hidden;
    border-radius: var(--frame-radius);
    background: #f2f2f2;
  }

  .carousel-track {
    display: flex;
    height: 100%;
    touch-action: pan-y;
    cursor: grab;
    /* transform / transition set via JS */
  }

  .carousel-track.dragging {
    cursor: grabbing;
  }

  .carousel-slide {
    flex: 0 0 100%;
    height: 100%;
    user-select: none;
  }

  .carousel-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  /* ===== Arrows ===== */
  .carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--arrow-bg);
    color: var(--arrow-fg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    transition: background 0.2s ease, opacity 0.2s ease;
    z-index: 2;
  }

  .carousel-arrow:hover {
    background: #ffffff;
  }

  .carousel-arrow:disabled {
    opacity: 0;
    pointer-events: none;
  }

  .carousel-arrow.prev { left: 10px; }
  .carousel-arrow.next { right: 10px; }

  .carousel-arrow svg {
    width: 16px;
    height: 16px;
  }

  /* ===== Dots ===== */
  .carousel-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }

  .carousel-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--dot);
    border: none;
    padding: 0;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .carousel-dot.active {
    background: var(--dot-active);
    width: 18px;
    border-radius: 3px;
  }

  @media (max-width: 480px) {
    .carousel-arrow { width: 32px; height: 32px; }
  }
</style>
</head>
<body>

  <div class="carousel" id="carousel">
    <div class="carousel-frame">
      <div class="carousel-track" id="carouselTrack">
        <!-- 이미지 3~5장: src만 교체하세요 -->
        <div class="carousel-slide"><img src="https://picsum.photos/id/1015/800/1200" alt="slide 1"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/id/1016/800/1200" alt="slide 2"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/id/1018/800/1200" alt="slide 3"></div>
        <div class="carousel-slide"><img src="https://picsum.photos/id/1019/800/1200" alt="slide 4"></div>
      </div>

      <button class="carousel-arrow prev" id="prevBtn" aria-label="Previous image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <button class="carousel-arrow next" id="nextBtn" aria-label="Next image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>

    <div class="carousel-dots" id="carouselDots"></div>
  </div>

<script>
(function () {
  const track = document.getElementById('carouselTrack');
  const slides = Array.from(track.children);
  const dotsWrap = document.getElementById('carouselDots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  const count = slides.length;
  if (count < 3 || count > 5) {
    console.warn('이미지는 최소 3개, 최대 5개를 권장합니다. 현재:', count);
  }

  let index = 0;
  let startX = 0;
  let currentX = 0;
  let isDragging = false;
  let frameWidth = track.parentElement.clientWidth;

  // dots 생성
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
    dot.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(dot);
  });
  const dots = Array.from(dotsWrap.children);

  function updateUI() {
    track.style.transition = 'transform 0.35s cubic-bezier(0.22, 1, 0.36, 1)';
    track.style.transform = `translateX(${-index * frameWidth}px)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === index));
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === count - 1;
  }

  function goTo(i) {
    index = Math.max(0, Math.min(count - 1, i));
    updateUI();
  }

  prevBtn.addEventListener('click', () => goTo(index - 1));
  nextBtn.addEventListener('click', () => goTo(index + 1));

  window.addEventListener('resize', () => {
    frameWidth = track.parentElement.clientWidth;
    track.style.transition = 'none';
    track.style.transform = `translateX(${-index * frameWidth}px)`;
  });

  // ===== 스와이프 (터치 + 마우스 드래그) =====
  function dragStart(x) {
    isDragging = true;
    startX = x;
    currentX = 0;
    track.classList.add('dragging');
    track.style.transition = 'none';
  }

  function dragMove(x) {
    if (!isDragging) return;
    currentX = x - startX;
    track.style.transform = `translateX(${-index * frameWidth + currentX}px)`;
  }

  function dragEnd() {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('dragging');

    const threshold = frameWidth * 0.15;
    if (currentX < -threshold && index < count - 1) {
      index++;
    } else if (currentX > threshold && index > 0) {
      index--;
    }
    updateUI();
  }

  // touch
  track.addEventListener('touchstart', (e) => dragStart(e.touches[0].clientX), { passive: true });
  track.addEventListener('touchmove', (e) => dragMove(e.touches[0].clientX), { passive: true });
  track.addEventListener('touchend', dragEnd);

  // mouse
  track.addEventListener('mousedown', (e) => { e.preventDefault(); dragStart(e.clientX); });
  window.addEventListener('mousemove', (e) => dragMove(e.clientX));
  window.addEventListener('mouseup', dragEnd);

  updateUI();
})();
</script>

</body>
</html>
